name: Run Tests with Allure Report
 
on:
  push:
    branches: [ "main" ]
  pull_request:
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
 
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r "test_automation (5) 1"/test_automation/requirements.txt
        
 
    # ✅ Install Playwright browsers
    - name: Install Playwright Browsers
      run: |
        pip install playwright
        playwright install --with-deps
        playwright install
 
    # ✅ Run tests
    - name: Run Tests
      run: pytest --alluredir=allure-results
 
    # ✅ Install Allure
    - name: Install Allure
      run: |
        sudo apt-get update
        sudo apt-get install -y default-jre
        wget https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
        tar -zxvf allure-2.29.0.tgz
        sudo mv allure-2.29.0 /opt/allure
        sudo ln -s /opt/allure/bin/allure /usr/bin/allure
 
    # ✅ Generate report
    - name: Generate Allure Report
      run: allure generate allure-results --clean -o allure-report
 
    # ✅ Upload HTML report
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
