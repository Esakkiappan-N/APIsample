name: Run API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10   # ✅ FIX HERE

      - run: pip install -r requirements.txt

      - run: |
          python app.py &
          sleep 5

      - run: pytest
